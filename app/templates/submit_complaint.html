{% extends "base.html" %}
{% block title %}Submit Complaint{% endblock %}
{% block content %}
<div style="text-align:center">
    <h1>Complaint Reporting & Resolution System</h1>
    <h3>Submit your complaint below</h3>
</div>
<form method="POST" enctype="multipart/form-data">
    <div class="form-group checkbox_group">
        <label>
            <strong><input type="checkbox" name="anonymous" id="anonymousCheck">Submit anonymously</strong>
            <small style="color:#6b7280;">Your identity will not be stored or shown.</small>
        </label>
    </div>
    <div class="form-group" id="nameField">
        <label>Full Name(Optional)</label>
        <input type="text" name="name" placeholder="Enter your full name">
    </div>
    <div class="form-group">
        <label>Complaint Category</label>
        <select name="category">
            <option>Service</option>
            <option>Staff</option>
            <option>Facilities</option>
            <option>Other</option>
        </select>
    </div>
    <div class="form-group">
        <label>Complaint Description</label>
        <textarea name="description" rows="5" placeholder="Describe your complaint here..." required></textarea>
    </div>
    <div class="form-group">
        <label>Attach Evidence (optional)</label>
        <input type="file" name="evidence">
    </div>
    <button type="submit" style="margin-top: 10px;">Submit Complaint</button>
</form>
<p><strong>Note:</strong> Save your Ticket ID to track your complaint.</p>
<script>
document.getElementById("anonymousCheck").addEventListener("change", function() {
    const nameField = document.getElementById("nameField");
    nameField.style.display = this.checked ? "none" : "block";
});
</script>
{% endblock %}
